<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubNew - Download de Vídeos Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <header class="header">
            <div class="logo">
                <i class="fa-brands fa-youtube"></i>
                <h1>TubNew</h1>
            </div>
            <p class="subtitle">Baixe vídeos em alta qualidade com facilidade</p>
        </header>

        <div class="card glass-effect">
            <div class="input-group">
                <div class="input-wrapper">
                    <i class="fa-solid fa-link input-icon"></i>
                    <input type="text" id="videoUrl" placeholder="Cole o link do YouTube aqui..." autocomplete="off">
                </div>
                <button id="checkBtn" class="btn-primary">
                    <span class="btn-text">Analisar</span>
                    <i class="fa-solid fa-arrow-right"></i>
                    <div class="loader hidden"></div>
                </button>
            </div>

            <div id="videoInfo" class="video-info hidden">
                <div class="preview-wrapper">
                    <!-- O iframe será inserido aqui via JS -->
                    <div id="videoPlaceholder">
                        <img id="thumbnail" src="" alt="Thumbnail do vídeo">
                        <div class="play-button">
                            <i class="fa-solid fa-play"></i>
                        </div>
                    </div>
                    <div id="videoPlayerContainer" class="hidden"></div>
                </div>

                <div class="info-content">
                    <h2 id="videoTitle" class="video-title">Título do Vídeo</h2>
                    <p id="channelName" class="channel-name">Canal</p>

                    <div class="options-grid">
                        <div class="select-wrapper">
                            <label>Formato / Qualidade</label>
                            <select id="qualitySelect">
                                <option value="best">Melhor Qualidade (MP4)</option>
                            </select>
                        </div>
                    </div>

                    <button id="downloadBtn" class="btn-download">
                        <i class="fa-solid fa-download"></i>
                        Baixar Agora
                    </button>
                </div>
            </div>

            <!-- Barra de Progresso -->
            <div id="progressContainer" class="progress-container hidden">
                <div class="progress-header">
                    <span id="progressStatus">Iniciando download...</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar-wrapper">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
            </div>

            <div id="statusMessage" class="status-message hidden">
                <i class="fa-solid fa-circle-info"></i>
                <span id="statusText">Processando...</span>
            </div>
        </div>

        <footer class="footer">
            <p>&copy; 2025 TubNew. Desenvolvido para alta performance.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>

</html>
